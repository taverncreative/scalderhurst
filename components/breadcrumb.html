<!-- Component: Breadcrumb Navigation

     USAGE:
     - Update list items per page to reflect the current page hierarchy.
     - JSON-LD BreadcrumbList schema belongs in each page's <head>, not here.

     SINGLE-LEVEL PAGE (e.g., /about/):
       <li><a href="/">Home</a></li>
       <li aria-current="page">About</li>

     TWO-LEVEL PAGE (e.g., /industries/food-packaging/):
       <li><a href="/">Home</a></li>
       <li><a href="/industries/">Industries</a></li>
       <li aria-current="page">Food Packaging</li>

     THREE-LEVEL PAGE (e.g., /board-packaging/corrugated/fluting/):
       <li><a href="/">Home</a></li>
       <li><a href="/board-packaging/">Board & Packaging</a></li>
       <li><a href="/board-packaging/corrugated/">Corrugated</a></li>
       <li aria-current="page">Fluting</li>

     RULES:
     - Only the last item gets aria-current="page" (no link).
     - All parent items are linked.
     - Keep the list flat — no nesting. -->
<nav aria-label="Breadcrumb">
  <ol>
    <li><a href="/">Home</a></li>
    <li aria-current="page">[Current Page Name]</li>
  </ol>
</nav>
